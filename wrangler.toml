name = "bharatclaw-telegram"
main = "apps/cloudflare-worker/src/index.ts"
compatibility_date = "2026-03-25"
workers_dev = true

[triggers]
crons = ["*/1 * * * *"]

[vars]
FOLLOWUP_MAX_RETRIES = "3"
FREE_MODE = "true"
PUBLIC_SIGNUP_ENABLED = "true"
LANDING_CTA_URL = "https://bharatclawapp.vercel.app/get-started"

[[d1_databases]]
binding = "DB"
database_name = "bharatclaw"
database_id = "cdb2cb57-89d0-4551-a282-c5d10fe2c6e7"
